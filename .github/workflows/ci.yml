name: CI — newbiv2

# Mission F — refonte 2026-05-04. Goals:
#  - Run on develop AND main (a hotfix push to main must be gated by CI).
#  - Parallelize lint / typecheck / audit / secret-scan with unit-tests
#    (each job is independent — no point in chaining them sequentially).
#  - Standardize on Node 22 LTS (matches `engines` in package.json).
#  - Keep e2e gated on a green static suite (lint + typecheck + unit) to
#    fail fast on cheap signals before booting the heavy stack.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ---------- Static checks (run in parallel) ----------

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    # Non-blocking for now — TypeScript is opt-in across the codebase
    # (1189 .js/.jsx vs 45 .ts/.tsx). Once the diagnostic count drops to 0,
    # remove `continue-on-error` and tighten `next.config.js`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Fail only on HIGH and CRITICAL vulnerabilities. Moderate are reported
      # but don't gate the build (Dependabot opens PRs to clear them).
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev || true
      - name: Audit fail on critical
        run: |
          set +e
          npm audit --audit-level=critical --omit=dev
          status=$?
          if [ $status -ne 0 ]; then
            echo "::error::Critical vulnerabilities found — see audit log above"
            exit 1
          fi

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Tests ----------

  unit-tests:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:run -- --coverage
        env:
          NODE_ENV: test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build (next)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  e2e-tests:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          MONGODB_URI_TEST: mongodb://localhost:27017/newbi-test
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'http://localhost:4000/graphql' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.WS_URL || 'ws://localhost:4000/graphql' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NODE_ENV: test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ---------- Discord notify on main failures ----------
  notify-main-failure:
    name: Discord — CI failed on main
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, audit, secret-scan, unit-tests, build, e2e-tests]
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          MSG_FIRST=$(printf '%s' "$MSG" | head -n1)
          MSG_TRIM=${MSG_FIRST:0:300}
          PAYLOAD=$(jq -n \
            --arg sha "${SHA:0:8}" \
            --arg actor "$ACTOR" \
            --arg msg "$MSG_TRIM" \
            --arg run "$RUN_URL" \
            '{
              content: "<@here>",
              embeds: [{
                title: "🚨 CI ÉCHOUÉE sur main — newbiv2",
                description: "Un push direct sur main n'a pas passé la CI. Ne déployez rien tant que la CI n'est pas verte.",
                color: 15548997,
                fields: [
                  { name: "SHA", value: $sha, inline: true },
                  { name: "Auteur", value: $actor, inline: true },
                  { name: "Commit", value: $msg, inline: false },
                  { name: "Run", value: $run, inline: false }
                ],
                timestamp: (now | todate)
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK"
