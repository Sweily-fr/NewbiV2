name: Deploy verify (prod) — newbiv2

# Mission H — post-deploy verification + Discord notification (Mission J inline).
#
# Flow:
#   1. CI workflow ("CI — newbiv2") completes successfully on main.
#   2. This workflow fires, polls the Vercel API until the latest prod
#      deployment for the configured project enters READY state (timeout 5 min).
#   3. Smoke tests (Playwright /smoke project) run against the live prod URL.
#   4. Discord notified with the verification result. On failure, the user
#      can manually fire `rollback.yml` to repromote the previous deployment.
#
# Why not auto-rollback: a smoke failure can be a flake, an infra blip, or
# a real regression — auto-promoting an older build risks hiding the
# problem. The Discord ping + a one-click manual rollback is safer for a
# small team without 24/7 oncall.
#
# Secrets required:
#   - VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   - DISCORD_WEBHOOK_URL
#   - TEST_USER_EMAIL, TEST_USER_PASSWORD (smoke uses authenticated routes)

on:
  workflow_run:
    workflows: ["CI — newbiv2"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Override Vercel deployment URL (e.g. https://newbi-v2-xxx.vercel.app)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

env:
  PROD_URL: "https://www.newbi.fr"

jobs:
  guard:
    name: Guard (CI must be green)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI green or manual dispatch — continuing"

  wait-for-vercel:
    name: Wait for Vercel deploy READY
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      target_url: ${{ steps.poll.outputs.target_url }}
      deployment_id: ${{ steps.poll.outputs.deployment_id }}
    steps:
      - name: Poll Vercel API
        id: poll
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          OVERRIDE_URL: ${{ github.event.inputs.deployment_url }}
        run: |
          set -e
          if [ -n "$OVERRIDE_URL" ]; then
            echo "target_url=$OVERRIDE_URL" >> "$GITHUB_OUTPUT"
            echo "deployment_id=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Poll for the latest READY production deployment, max 5 min.
          for i in $(seq 1 30); do
            resp=$(curl -sS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=production&limit=1&state=READY")
            id=$(echo "$resp" | jq -r '.deployments[0].uid // empty')
            url=$(echo "$resp" | jq -r '.deployments[0].url // empty')
            if [ -n "$id" ] && [ -n "$url" ]; then
              echo "deployment_id=$id" >> "$GITHUB_OUTPUT"
              echo "target_url=https://$url" >> "$GITHUB_OUTPUT"
              echo "✅ Found READY deployment $id at https://$url"
              exit 0
            fi
            echo "⏳ Attempt $i/30 — no READY prod deploy yet, sleeping 10s"
            sleep 10
          done
          echo "::error::Timed out waiting for Vercel deployment to become READY"
          exit 1

  smoke:
    name: Smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke against ${{ env.PROD_URL }}
        run: npx playwright test e2e/smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PROD_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [wait-for-vercel, smoke]
    if: always()
    steps:
      - name: Build payload + post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          DEPLOY_URL: ${{ needs.wait-for-vercel.outputs.target_url }}
          DEPLOY_ID: ${{ needs.wait-for-vercel.outputs.deployment_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          if [ "$SMOKE_RESULT" = "success" ]; then
            COLOR=5763719   # green
            TITLE="✅ Smoke PROD vert — $REPO"
            DESC="Vercel deploy \`${DEPLOY_ID}\` répond aux smoke tests."
          else
            COLOR=15548997  # red
            TITLE="🚨 Smoke PROD ÉCHOUÉ — $REPO"
            DESC="Lance \`rollback.yml\` (workflow_dispatch) pour repromote le deploy précédent. <@here>"
          fi
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg url "$DEPLOY_URL" \
            --arg run "$RUN_URL" \
            --arg sha "${SHA:0:8}" \
            --arg actor "$ACTOR" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                fields: [
                  { name: "Deploy URL", value: $url, inline: false },
                  { name: "SHA", value: $sha, inline: true },
                  { name: "Auteur", value: $actor, inline: true },
                  { name: "Run", value: $run, inline: false }
                ],
                timestamp: (now | todate)
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK"
