# Dependabot config — Mission K (2026-05-04).
# Automates dependency updates so security patches don't accumulate.
#
# Strategy:
#   - npm ecosystem, weekly cadence, max 5 open PRs at once.
#   - Group minor + patch updates into a single PR per group to reduce churn.
#   - Major updates land as individual PRs (need attention, may be breaking).
#   - GitHub Actions also tracked so action versions don't drift.
#
# Reviewers/labels are intentionally absent — add them via the GitHub UI or
# extend this file once a CODEOWNERS pattern is in place.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Runtime libraries — patch + minor bundled to avoid PR fatigue.
      runtime-minor-patch:
        update-types: ["minor", "patch"]
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@apollo/client"
          - "better-auth"
          - "stripe"
      # Dev tooling — patch + minor bundled.
      devtools-minor-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    ignore:
      # Pin major bumps for the most blast-radius packages — handled manually.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    target-branch: "develop"
    commit-message:
      prefix: "chore(ci)"
